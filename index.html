<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8" />
<title>Jake's konfirmation</title>
<style>
  :root {
    --tile: 180px;
    --gap: 4px;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #1f2330;
    color: #f0f0f0;
    margin: 0;
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  h1 { margin: 0; font-weight: 500; letter-spacing: 0.5px; }
  .controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
  }
  button, label.btn {
    background: #4f6cff;
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover, label.btn:hover { background: #6a83ff; }
  button.secondary { background: #3a4055; }
  button.secondary:hover { background: #4d556e; }
  input[type="file"] { display: none; }

  .board {
    display: grid;
    grid-template-columns: repeat(3, var(--tile));
    grid-template-rows: repeat(3, var(--tile));
    gap: var(--gap);
    background: #11141d;
    padding: var(--gap);
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    user-select: none;
  }
  .tile {
    width: var(--tile);
    height: var(--tile);
    background-size: calc(var(--tile) * 3) calc(var(--tile) * 3);
    background-repeat: no-repeat;
    position: relative;
    cursor: grab;
    border-radius: 4px;
    overflow: hidden;
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .tile:active { cursor: grabbing; }
  .tile.dragging { opacity: 0.4; transform: scale(0.95); }
  .tile.drag-over {
    outline: 3px solid #ffd166;
    outline-offset: -3px;
  }
  .tile .num {
    position: absolute;
    top: 6px;
    left: 6px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }
  .preview {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .preview.show { display: flex; }
  .preview img {
    width: 180px;
    height: 180px;
    object-fit: cover;
    border-radius: 6px;
    border: 2px solid #4f6cff;
  }
  .preview span { font-size: 13px; opacity: 0.75; }
  .status {
    font-size: 14px;
    opacity: 0.7;
    min-height: 20px;
  }
  .win {
    color: #6bd968;
    font-weight: 600;
    opacity: 1;
  }
</style>
</head>
<body>
  <h1>Jake's konfirmation</h1>

  <div class="controls">
    <label class="btn">
      Indlæs billede
      <input type="file" id="fileInput" accept="image/*" />
    </label>
    <button id="shuffleBtn">Bland</button>
    <button id="resetBtn" class="secondary">Nulstil</button>
    <button id="previewBtn" class="secondary">Vis original</button>
  </div>

  <div id="board" class="board"></div>

  <div id="preview" class="preview">
    <img id="previewImg" alt="original" />
    <span>original</span>
  </div>

  <div id="status" class="status">Træk en brik over på en anden for at bytte dem.</div>

<script>
  const TILE_COUNT = 9;
  const board = document.getElementById('board');
  const status = document.getElementById('status');
  const fileInput = document.getElementById('fileInput');
  const shuffleBtn = document.getElementById('shuffleBtn');
  const resetBtn = document.getElementById('resetBtn');
  const previewBtn = document.getElementById('previewBtn');
  const preview = document.getElementById('preview');
  const previewImg = document.getElementById('previewImg');

  // tiles[i] = which original-piece index sits in slot i (0-8, left-to-right, top-to-bottom)
  let tiles = [0,1,2,3,4,5,6,7,8];
  let imageUrl = 'https://picsum.photos/540/540?random=1';

  function pieceBackgroundPosition(pieceIndex) {
    const col = pieceIndex % 3;
    const row = Math.floor(pieceIndex / 3);
    // Negative offsets shift the big bg image so the right portion shows.
    return `-${col * 180}px -${row * 180}px`;
  }

  function render() {
    board.innerHTML = '';
    tiles.forEach((piece, slot) => {
      const t = document.createElement('div');
      t.className = 'tile';
      t.draggable = true;
      t.dataset.slot = slot;
      t.style.backgroundImage = `url("${imageUrl}")`;
      t.style.backgroundPosition = pieceBackgroundPosition(piece);
      const num = document.createElement('div');
      num.className = 'num';
      num.textContent = slot + 1;
      t.appendChild(num);
      board.appendChild(t);
    });
    previewImg.src = imageUrl;
    checkWin();
  }

  function checkWin() {
    const solved = tiles.every((v, i) => v === i);
    if (solved) {
      status.textContent = 'Løst!';
      status.classList.add('win');
    } else {
      status.classList.remove('win');
      status.textContent = 'Træk en brik over på en anden for at bytte dem.';
    }
  }

  function shuffle() {
    do {
      for (let i = tiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tiles[i], tiles[j]] = [tiles[j], tiles[i]];
      }
    } while (tiles.every((v, i) => v === i));
    render();
    status.textContent = 'Blandet — hjælp en gæst med at samle den igen.';
    status.classList.remove('win');
  }

  function reset() {
    tiles = [0,1,2,3,4,5,6,7,8];
    render();
  }

  // Drag-and-drop: swap source slot and target slot.
  let dragSlot = null;
  board.addEventListener('dragstart', (e) => {
    const tile = e.target.closest('.tile');
    if (!tile) return;
    dragSlot = Number(tile.dataset.slot);
    tile.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    // Some browsers need data set on the transfer.
    e.dataTransfer.setData('text/plain', String(dragSlot));
  });
  board.addEventListener('dragend', (e) => {
    const tile = e.target.closest('.tile');
    if (tile) tile.classList.remove('dragging');
    document.querySelectorAll('.tile.drag-over').forEach(el => el.classList.remove('drag-over'));
    dragSlot = null;
  });
  board.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const tile = e.target.closest('.tile');
    if (!tile) return;
    document.querySelectorAll('.tile.drag-over').forEach(el => el.classList.remove('drag-over'));
    if (Number(tile.dataset.slot) !== dragSlot) tile.classList.add('drag-over');
  });
  board.addEventListener('drop', (e) => {
    e.preventDefault();
    const tile = e.target.closest('.tile');
    if (!tile || dragSlot === null) return;
    const targetSlot = Number(tile.dataset.slot);
    if (targetSlot === dragSlot) return;
    [tiles[dragSlot], tiles[targetSlot]] = [tiles[targetSlot], tiles[dragSlot]];
    render();
  });

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      imageUrl = ev.target.result;
      reset();
    };
    reader.readAsDataURL(file);
  });

  shuffleBtn.addEventListener('click', shuffle);
  resetBtn.addEventListener('click', reset);
  previewBtn.addEventListener('click', () => {
    preview.classList.toggle('show');
    previewBtn.textContent = preview.classList.contains('show') ? 'Skjul original' : 'Vis original';
  });

  render();
</script>
</body>
</html>
